<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập | AutoFill AI</title>
    <script src="/static/js/theme-manager.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#f7f9fb",
                        surface: "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-highest": "#e0e3e5",
                        outline: "#737686",
                        "outline-variant": "#c3c6d7",
                        primary: "#004ac6",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#434655"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        button: ["Inter"],
                        h2: ["Manrope"],
                        h3: ["Manrope"],
                        "label-bold": ["Inter"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        button: ["15px", { lineHeight: "1", fontWeight: "500" }],
                        h2: ["32px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "700" }],
                        h3: ["24px", { lineHeight: "1.4", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "label-bold": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .bg-auth-pattern {
            background-color: #f7f9fb;
            background-image: radial-gradient(#004ac608 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .toast-message {
            display: none;
        }
        .toast-message.show {
            display: block;
        }
    </style>
</head>
<body class="bg-auth-pattern text-on-surface font-body-md min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="relative z-10 w-full max-w-2xl">
            <div class="bg-white rounded-xl shadow-xl shadow-primary/10 p-8 md:p-12 border border-surface-container-high flex flex-col">
                <div class="flex flex-col items-center mb-8">
                    <div class="flex items-center gap-1 mb-6">
                        <span class="material-symbols-outlined text-primary text-[40px]">auto_awesome</span>
                        <span class="font-h3 text-h3 font-extrabold text-primary">AutoFill AI</span>
                    </div>
                    <h1 class="font-h2 text-h2 text-on-surface text-center mb-1">Đăng nhập</h1>
                    <p class="font-body-md text-on-surface-variant text-center">Chào mừng bạn quay trở lại với AutoFill AI</p>
                </div>

                <div id="loginMessage" class="toast-message mb-5 rounded-lg px-4 py-3 text-sm font-medium"></div>

                <form id="loginForm" class="space-y-6" novalidate>
                    <div class="space-y-1">
                        <label class="font-label-bold text-label-bold text-on-surface-variant block" for="loginUsername">Tên đăng nhập hoặc Email</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[20px]">person</span>
                            </div>
                            <input id="loginUsername" name="username" autocomplete="username" class="w-full pl-[52px] pr-4 py-3 bg-[#F1F5F9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" placeholder="Nhập tên đăng nhập hoặc email" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="font-label-bold text-label-bold text-on-surface-variant" for="loginPassword">Mật khẩu</label>
                            <button id="forgotPasswordBtn" class="font-body-sm text-primary hover:underline transition-all bg-transparent border-0 p-0 cursor-pointer" type="button">Quên mật khẩu?</button>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
                            </div>
                            <input id="loginPassword" name="password" autocomplete="new-password" class="w-full pl-[52px] pr-4 py-3 bg-[#F1F5F9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" placeholder="••••••••" type="password" required />
                        </div>
                    </div>

                    <div class="flex items-center gap-2 py-1">
                        <input id="remember" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all" type="checkbox" />
                        <label class="font-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Ghi nhớ tôi</label>
                    </div>

                    <button id="loginBtn" class="w-full py-3 px-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-button text-button rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200" type="submit">
                        Đăng nhập
                    </button>
                    <div class="relative py-1">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-outline-variant/40"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-xs text-on-surface-variant">hoặc</span>
                        </div>
                    </div>
                    <button id="googleLoginBtn" class="w-full py-3 px-4 bg-white text-on-surface font-button text-button rounded-lg border border-outline-variant/60 hover:border-primary hover:bg-surface-container-low transition-all duration-200 flex items-center justify-center gap-2" type="button">
                        <svg aria-hidden="true" class="w-5 h-5" viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.21 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.84 1.154 7.955 3.045l5.657-5.657C34.045 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.651-.389-3.917z"/>
                            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 19.001 13 24 13c3.059 0 5.84 1.154 7.955 3.045l5.657-5.657C34.045 6.053 29.27 4 24 4c-7.682 0-14.365 4.337-17.694 10.691z"/>
                            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.191-5.238C29.144 35.091 26.683 36 24 36c-5.19 0-9.625-3.328-11.284-7.946l-6.522 5.024C9.485 39.556 16.227 44 24 44z"/>
                            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.046 12.046 0 0 1-4.085 5.571l.003-.002 6.191 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.651-.389-3.917z"/>
                        </svg>
                        <span id="googleLoginBtnLabel">Đăng nhập với Google</span>
                    </button>
                    <p id="googleLoginHint" class="hidden mt-2 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 leading-relaxed"></p>
                </form>

                <div class="mt-8">
                    <p class="text-center font-body-md text-on-surface-variant">
                        Chưa có tài khoản?
                        <a id="registerLink" class="text-primary font-bold hover:underline" href="/register">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-6 bg-surface-container-low border-t border-outline-variant/30">
        <div class="max-w-[1280px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="font-body-sm text-on-surface-variant">© 2026 AutoFill AI System. Mọi quyền được bảo lưu.</p>
            <div class="flex gap-8">
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
            </div>
        </div>
    </footer>

    <script>
        const REMEMBER_LOGIN_KEY = "autofill-remember-login";
        const REMEMBER_IDENTIFIER_KEY = "autofill-remember-identifier";
        const loginMessage = document.getElementById("loginMessage");
        const rememberCheckbox = document.getElementById("remember");
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const googleLoginBtn = document.getElementById("googleLoginBtn");
        const googleLoginHint = document.getElementById("googleLoginHint");
        const registerLink = document.getElementById("registerLink");
        let lastLoginIdentifier = "";

        function setMessage(target, text, type) {
            target.textContent = text;
            target.className = "toast-message show mb-5 rounded-lg px-4 py-3 text-sm font-medium";
            if (type === "error") {
                target.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
            } else {
                target.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
            }
        }

        function clearMessage(target) {
            target.textContent = "";
            target.className = "toast-message mb-5 rounded-lg px-4 py-3 text-sm font-medium";
        }

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function isValidEmail(email) {
            if (!email || email.length > 254) {
                return false;
            }
            const parts = email.split("@");
            if (parts.length !== 2) {
                return false;
            }
            const local = parts[0];
            const domain = parts[1];
            if (!local || !domain) {
                return false;
            }
            if (local.startsWith(".") || local.endsWith(".") || local.includes("..")) {
                return false;
            }
            if (domain.startsWith(".") || domain.endsWith(".") || domain.includes("..")) {
                return false;
            }
            if (!domain.includes(".")) {
                return false;
            }
            if (!/^[A-Za-z0-9.!#$%&*+/=?^_`{|}~-]+$/.test(local)) {
                return false;
            }
            if (!/^[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)+$/.test(domain)) {
                return false;
            }
            const tld = domain.split(".").pop();
            return !!tld && /^[A-Za-z]{2,}$/.test(tld);
        }

        function appendResendVerificationAction() {
            if (document.getElementById("resendVerificationBtn")) {
                return;
            }
            const actionWrap = document.createElement("div");
            actionWrap.className = "mt-3";

            const button = document.createElement("button");
            button.type = "button";
            button.id = "resendVerificationBtn";
            button.className = "text-primary hover:underline text-sm font-medium bg-transparent border-0 p-0 cursor-pointer";
            button.textContent = "Gửi lại email xác thực";

            button.addEventListener("click", handleResendVerification);
            actionWrap.appendChild(button);
            loginMessage.appendChild(actionWrap);
        }

        async function handleResendVerification() {
            const button = document.getElementById("resendVerificationBtn");
            if (!button) {
                return;
            }

            const candidate = (lastLoginIdentifier || document.getElementById("loginUsername").value || "").trim().toLowerCase();
            if (!isValidEmail(candidate)) {
                setMessage(loginMessage, "Vui lòng nhập đúng email đã đăng ký để gửi lại xác thực.", "error");
                return;
            }

            button.disabled = true;
            const originalText = button.textContent;
            button.textContent = "Đang gửi...";
            try {
                const response = await fetch("/api/auth/resend-verification", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identifier: candidate })
                });
                const data = await parseApiResponse(response);
                setMessage(loginMessage, data.message || "Đã gửi lại email xác thực.", "success");
            } catch (error) {
                const msg = error && error.message === "Failed to fetch"
                    ? "Không thể kết nối máy chủ. Vui lòng kiểm tra server và thử lại."
                    : (error.message || "Gửi lại email xác thực thất bại.");
                setMessage(loginMessage, msg, "error");
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        function getNextUrl() {
            return "/home";
        }

        function getGoogleStartUrl() {
            const next = getNextUrl();
            return "/api/auth/google/start?next=" + encodeURIComponent(next);
        }

        function setGoogleLoginEnabled(enabled) {
            googleLoginBtn.disabled = !enabled;
            googleLoginBtn.classList.toggle("opacity-60", !enabled);
            googleLoginBtn.classList.toggle("cursor-not-allowed", !enabled);
            googleLoginBtn.classList.toggle("hover:border-primary", enabled);
            googleLoginBtn.classList.toggle("hover:bg-surface-container-low", enabled);
            if (enabled) {
                googleLoginBtn.title = "";
                googleLoginHint.classList.add("hidden");
                googleLoginHint.textContent = "";
            }
        }

        async function refreshGoogleButtonState() {
            try {
                const response = await fetch("/api/auth/google/config", {
                    method: "GET",
                    credentials: "include",
                    cache: "no-store"
                });
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                if (data && data.enabled) {
                    setGoogleLoginEnabled(true);
                    return;
                }
                setGoogleLoginEnabled(false);
                googleLoginBtn.title = "Google OAuth chưa được cấu hình trên server";
                const missing = Array.isArray(data && data.missing) ? data.missing : [];
                if (missing.includes("GOOGLE_OAUTH_CLIENT_SECRET")) {
                    googleLoginHint.textContent =
                        "Chưa cấu hình Client Secret: mở backend/.env, điền GOOGLE_OAUTH_CLIENT_SECRET (lấy từ Google Cloud Console → Credentials), rồi khởi động lại server.";
                } else if (missing.includes("GOOGLE_OAUTH_CLIENT_ID")) {
                    googleLoginHint.textContent =
                        "Chưa cấu hình Client ID: điền GOOGLE_OAUTH_CLIENT_ID trong backend/.env rồi khởi động lại server.";
                } else {
                    googleLoginHint.textContent =
                        "Đăng nhập Google chưa sẵn sàng trên server. Kiểm tra GOOGLE_OAUTH_CLIENT_ID và GOOGLE_OAUTH_CLIENT_SECRET trong backend/.env.";
                }
                googleLoginHint.classList.remove("hidden");
            } catch (_error) {
                // Endpoint unavailable: keep button clickable; server will respond on /google/start.
            }
        }

        function loadRememberedIdentifier() {
            const enabled = localStorage.getItem(REMEMBER_LOGIN_KEY) === "1";
            const identifier = localStorage.getItem(REMEMBER_IDENTIFIER_KEY) || "";
            document.getElementById("loginPassword").value = "";
            if (!enabled) {
                rememberCheckbox.checked = false;
                document.getElementById("loginUsername").value = "";
                return;
            }
            document.getElementById("loginUsername").value = identifier;
            rememberCheckbox.checked = true;
        }

        function persistRememberedIdentifier(identifier) {
            if (!rememberCheckbox.checked) {
                localStorage.removeItem(REMEMBER_LOGIN_KEY);
                localStorage.removeItem(REMEMBER_IDENTIFIER_KEY);
                return;
            }
            localStorage.setItem(REMEMBER_LOGIN_KEY, "1");
            localStorage.setItem(REMEMBER_IDENTIFIER_KEY, identifier || "");
        }

        async function parseApiResponse(response) {
            const raw = await response.text();
            let data = {};
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch {
                data = {};
            }
            if (!response.ok) {
                throw new Error(data.error || data.detail || data.message || ("HTTP " + response.status));
            }
            return data;
        }

        async function handleLoginSubmit(event) {
            event.preventDefault();
            clearMessage(loginMessage);

            const identifier = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            lastLoginIdentifier = identifier;
            if (!identifier || !password) {
                setMessage(loginMessage, "Vui lòng nhập đầy đủ tên đăng nhập/email và mật khẩu.", "error");
                return;
            }

            loginBtn.disabled = true;
            const originalLabel = loginBtn.textContent;
            loginBtn.textContent = "Đang đăng nhập...";
            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identifier, password })
                });
                await parseApiResponse(response);
                persistRememberedIdentifier(identifier);
                setMessage(loginMessage, "Đăng nhập thành công. Đang chuyển hướng...", "success");
                window.location.replace(getNextUrl());
            } catch (error) {
                const msg = error && error.message === "Failed to fetch"
                    ? "Không thể kết nối máy chủ. Vui lòng kiểm tra server và thử lại."
                    : (error.message || "Đăng nhập thất bại.");
                setMessage(loginMessage, msg, "error");
                if ((error.message || "").includes("xác thực")) {
                    appendResendVerificationAction();
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = originalLabel;
            }
        }

        document.getElementById("forgotPasswordBtn").addEventListener("click", () => {
            setMessage(loginMessage, "Tính năng quên mật khẩu đang được cập nhật. Vui lòng liên hệ quản trị viên.", "error");
        });

        loginForm.addEventListener("submit", handleLoginSubmit);
        googleLoginBtn.addEventListener("click", () => {
            if (googleLoginBtn.disabled) {
                setMessage(
                    loginMessage,
                    googleLoginHint.textContent || "Đăng nhập Google chưa được cấu hình trên server.",
                    "error"
                );
                return;
            }
            googleLoginBtn.disabled = true;
            const labelEl = document.getElementById("googleLoginBtnLabel");
            const originalText = labelEl ? labelEl.textContent : "Đăng nhập với Google";
            if (labelEl) {
                labelEl.textContent = "Đang chuyển tới Google...";
            }
            window.location.assign(getGoogleStartUrl());
            setTimeout(() => {
                if (!googleLoginHint.classList.contains("hidden")) {
                    googleLoginBtn.disabled = true;
                } else {
                    googleLoginBtn.disabled = false;
                }
                if (labelEl) {
                    labelEl.textContent = originalText;
                }
            }, 2000);
        });

        window.addEventListener("load", () => {
            loadRememberedIdentifier();
            void refreshGoogleButtonState();
            const next = getQueryParam("next");
            if (next) {
                registerLink.href = "/register?next=" + encodeURIComponent(next);
            }
            const verifiedState = getQueryParam("verified");
            if (verifiedState === "success") {
                setMessage(loginMessage, "Xác thực email thành công. Bạn có thể đăng nhập ngay.", "success");
            } else if (verifiedState === "already") {
                setMessage(loginMessage, "Email đã được xác thực trước đó. Bạn có thể đăng nhập.", "success");
            } else if (verifiedState === "expired") {
                setMessage(loginMessage, "Liên kết xác thực đã hết hạn. Vui lòng gửi lại email xác thực.", "error");
                appendResendVerificationAction();
            } else if (verifiedState === "invalid") {
                setMessage(loginMessage, "Liên kết xác thực không hợp lệ.", "error");
            }

            const googleState = getQueryParam("google");
            if (googleState === "not_configured") {
                setMessage(loginMessage, "Đăng nhập Google chưa được cấu hình trên hệ thống.", "error");
            } else if (googleState === "email_not_registered") {
                setMessage(loginMessage, "Email Google này chưa được đăng ký trong hệ thống. Vui lòng đăng ký trước.", "error");
            } else if (googleState === "email_not_verified") {
                setMessage(loginMessage, "Email của tài khoản này chưa xác thực trong hệ thống.", "error");
                appendResendVerificationAction();
            } else if (googleState === "account_disabled") {
                setMessage(loginMessage, "Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.", "error");
            } else if (googleState === "db_unavailable") {
                setMessage(loginMessage, "Không kết nối được MySQL. Hãy bật MySQL (XAMPP/WAMP hoặc dịch vụ MySQL) rồi thử đăng nhập Google lại.", "error");
            } else if (googleState === "invalid_state") {
                setMessage(loginMessage, "Phiên đăng nhập Google đã hết hạn (thường do khởi động lại server). Vui lòng bấm Đăng nhập với Google lại.", "error");
            } else if (googleState === "missing_code" || googleState === "token_error" || googleState === "invalid_email" || googleState === "oauth_error") {
                setMessage(loginMessage, "Đăng nhập Google thất bại. Vui lòng thử lại.", "error");
            }
        });
    </script>
</body>
</html>
