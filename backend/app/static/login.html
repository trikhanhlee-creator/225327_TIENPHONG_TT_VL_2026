<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập | AutoFill AI</title>
    <script src="/static/js/theme-manager.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#f7f9fb",
                        surface: "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-highest": "#e0e3e5",
                        outline: "#737686",
                        "outline-variant": "#c3c6d7",
                        primary: "#004ac6",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#434655"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        button: ["Inter"],
                        h2: ["Manrope"],
                        h3: ["Manrope"],
                        "label-bold": ["Inter"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        button: ["15px", { lineHeight: "1", fontWeight: "500" }],
                        h2: ["32px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "700" }],
                        h3: ["24px", { lineHeight: "1.4", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "label-bold": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .bg-auth-pattern {
            background-color: #f7f9fb;
            background-image: radial-gradient(#004ac608 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .toast-message {
            display: none;
        }
        .toast-message.show {
            display: block;
        }
    </style>
</head>
<body class="bg-auth-pattern text-on-surface font-body-md min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="relative z-10 w-full max-w-2xl">
            <div class="bg-white rounded-xl shadow-xl shadow-primary/10 p-8 md:p-12 border border-surface-container-high flex flex-col">
                <div class="flex flex-col items-center mb-8">
                    <div class="flex items-center gap-1 mb-6">
                        <span class="material-symbols-outlined text-primary text-[40px]">auto_awesome</span>
                        <span class="font-h3 text-h3 font-extrabold text-primary">AutoFill AI</span>
                    </div>
                    <h1 class="font-h2 text-h2 text-on-surface text-center mb-1">Đăng nhập</h1>
                    <p class="font-body-md text-on-surface-variant text-center">Chào mừng bạn quay trở lại với AutoFill AI</p>
                </div>

                <div id="loginMessage" class="toast-message mb-5 rounded-lg px-4 py-3 text-sm font-medium"></div>

                <form id="loginForm" class="space-y-6" novalidate>
                    <div class="space-y-1">
                        <label class="font-label-bold text-label-bold text-on-surface-variant block" for="loginUsername">Tên đăng nhập</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[20px]">person</span>
                            </div>
                            <input id="loginUsername" name="username" autocomplete="username" class="w-full pl-[52px] pr-4 py-3 bg-[#F1F5F9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" placeholder="Nhập tên đăng nhập hoặc email" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="font-label-bold text-label-bold text-on-surface-variant" for="loginPassword">Mật khẩu</label>
                            <button id="forgotPasswordBtn" class="font-body-sm text-primary hover:underline transition-all bg-transparent border-0 p-0 cursor-pointer" type="button">Quên mật khẩu?</button>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
                            </div>
                            <input id="loginPassword" name="password" autocomplete="new-password" class="w-full pl-[52px] pr-4 py-3 bg-[#F1F5F9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" placeholder="••••••••" type="password" required />
                        </div>
                    </div>

                    <div class="flex items-center gap-2 py-1">
                        <input id="remember" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all" type="checkbox" />
                        <label class="font-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Ghi nhớ tôi</label>
                    </div>

                    <button id="loginBtn" class="w-full py-3 px-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-button text-button rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200" type="submit">
                        Đăng nhập
                    </button>
                </form>

                <div class="mt-8">
                    <p class="text-center font-body-md text-on-surface-variant">
                        Chưa có tài khoản?
                        <a id="registerLink" class="text-primary font-bold hover:underline" href="/register">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-6 bg-surface-container-low border-t border-outline-variant/30">
        <div class="max-w-[1280px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="font-body-sm text-on-surface-variant">© 2026 AutoFill AI System. Mọi quyền được bảo lưu.</p>
            <div class="flex gap-8">
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
                <a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
            </div>
        </div>
    </footer>

    <script>
        const REMEMBER_LOGIN_KEY = "autofill-remember-login";
        const REMEMBER_USERNAME_KEY = "autofill-remember-username";
        const loginMessage = document.getElementById("loginMessage");
        const rememberCheckbox = document.getElementById("remember");
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const registerLink = document.getElementById("registerLink");

        function setMessage(target, text, type) {
            target.textContent = text;
            target.className = "toast-message show mb-5 rounded-lg px-4 py-3 text-sm font-medium";
            if (type === "error") {
                target.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
            } else {
                target.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
            }
        }

        function clearMessage(target) {
            target.textContent = "";
            target.className = "toast-message mb-5 rounded-lg px-4 py-3 text-sm font-medium";
        }

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function getNextUrl() {
            return "/home";
        }

        function loadRememberedUsername() {
            const enabled = localStorage.getItem(REMEMBER_LOGIN_KEY) === "1";
            const username = localStorage.getItem(REMEMBER_USERNAME_KEY) || "";
            document.getElementById("loginPassword").value = "";
            if (!enabled) {
                rememberCheckbox.checked = false;
                document.getElementById("loginUsername").value = "";
                return;
            }
            document.getElementById("loginUsername").value = username;
            rememberCheckbox.checked = true;
        }

        function persistRememberedUsername(username) {
            if (!rememberCheckbox.checked) {
                localStorage.removeItem(REMEMBER_LOGIN_KEY);
                localStorage.removeItem(REMEMBER_USERNAME_KEY);
                return;
            }
            localStorage.setItem(REMEMBER_LOGIN_KEY, "1");
            localStorage.setItem(REMEMBER_USERNAME_KEY, username || "");
        }

        async function parseApiResponse(response) {
            const raw = await response.text();
            let data = {};
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch {
                data = {};
            }
            if (!response.ok) {
                throw new Error(data.error || data.detail || data.message || ("HTTP " + response.status));
            }
            return data;
        }

        async function handleLoginSubmit(event) {
            event.preventDefault();
            clearMessage(loginMessage);

            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) {
                setMessage(loginMessage, "Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.", "error");
                return;
            }

            loginBtn.disabled = true;
            const originalLabel = loginBtn.textContent;
            loginBtn.textContent = "Đang đăng nhập...";
            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                await parseApiResponse(response);
                persistRememberedUsername(username);
                setMessage(loginMessage, "Đăng nhập thành công. Đang chuyển hướng...", "success");
                window.location.replace(getNextUrl());
            } catch (error) {
                const msg = error && error.message === "Failed to fetch"
                    ? "Không thể kết nối máy chủ. Vui lòng kiểm tra server và thử lại."
                    : (error.message || "Đăng nhập thất bại.");
                setMessage(loginMessage, msg, "error");
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = originalLabel;
            }
        }

        document.getElementById("forgotPasswordBtn").addEventListener("click", () => {
            setMessage(loginMessage, "Tính năng quên mật khẩu đang được cập nhật. Vui lòng liên hệ quản trị viên.", "error");
        });

        loginForm.addEventListener("submit", handleLoginSubmit);

        window.addEventListener("load", () => {
            loadRememberedUsername();
            const next = getQueryParam("next");
            if (next) {
                registerLink.href = "/register?next=" + encodeURIComponent(next);
            }
        });
    </script>
</body>
</html>
