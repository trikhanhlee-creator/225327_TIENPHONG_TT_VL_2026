<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng ký | AutoFill AI</title>
    <script src="/static/js/theme-manager.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        outline: "#737686",
                        "outline-variant": "#c3c6d7",
                        primary: "#004ac6",
                        "primary-container": "#2563eb",
                        "on-primary-container": "#eeefff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#434655"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        h2: ["Manrope"],
                        h3: ["Manrope"],
                        "label-bold": ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .bg-auth-pattern {
            background-color: #f7f9fb;
            background-image: radial-gradient(#004ac608 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .toast-message {
            display: none;
        }
        .toast-message.show {
            display: block;
        }
    </style>
</head>
<body class="bg-auth-pattern text-on-surface font-body-md min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="relative z-10 w-full max-w-2xl">
            <div class="bg-white rounded-xl shadow-xl shadow-primary/10 p-8 md:p-12 border border-surface-container-high">
                <div class="flex flex-col items-center gap-1 mb-8">
                    <div class="flex items-center gap-1 text-primary">
                        <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
                        <span class="font-h3 text-2xl font-extrabold tracking-tight">AutoFill AI</span>
                    </div>
                    <h1 class="font-h2 text-3xl font-bold">Đăng ký</h1>
                    <p class="font-body-md text-on-surface-variant">Tham gia cùng AutoFill AI ngay hôm nay</p>
                </div>

                <div id="signupMessage" class="toast-message mb-5 rounded-lg px-4 py-3 text-sm font-medium"></div>

                <form id="signupForm" class="space-y-6" novalidate>
                    <div class="space-y-1">
                        <label class="font-label-bold text-sm text-on-surface-variant block" for="signupFullName">HỌ VÀ TÊN</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
                            <input id="signupFullName" class="w-full pl-[56px] pr-4 py-3 bg-surface-container-low border-transparent border-2 focus:border-primary focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="Nguyễn Văn A" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="font-label-bold text-sm text-on-surface-variant block" for="signupUsername">TÊN ĐĂNG NHẬP</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person_outline</span>
                            <input id="signupUsername" class="w-full pl-[56px] pr-4 py-3 bg-surface-container-low border-transparent border-2 focus:border-primary focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="username123" type="text" maxlength="20" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="font-label-bold text-sm text-on-surface-variant block" for="signupEmail">EMAIL</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                            <input id="signupEmail" class="w-full pl-[56px] pr-4 py-3 bg-surface-container-low border-transparent border-2 focus:border-primary focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="example@gmail.com" type="email" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="font-label-bold text-sm text-on-surface-variant block" for="signupPassword">MẬT KHẨU</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                            <input id="signupPassword" class="w-full pl-[56px] pr-4 py-3 bg-surface-container-low border-transparent border-2 focus:border-primary focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="••••••••" type="password" minlength="6" required />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="font-label-bold text-sm text-on-surface-variant block" for="signupConfirmPassword">XÁC NHẬN MẬT KHẨU</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">verified_user</span>
                            <input id="signupConfirmPassword" class="w-full pl-[56px] pr-4 py-3 bg-surface-container-low border-transparent border-2 focus:border-primary focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <div class="flex items-start gap-2">
                        <input id="terms" class="mt-1 rounded text-primary focus:ring-primary" type="checkbox" />
                        <label class="font-body-sm text-on-surface-variant" for="terms">Tôi đồng ý với điều khoản dịch vụ và chính sách bảo mật.</label>
                    </div>

                    <button id="signupBtn" class="w-full py-3 px-4 bg-primary text-white font-label-bold text-lg rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container hover:text-on-primary-container active:scale-[0.98] transition-all" type="submit">
                        Đăng ký
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="font-body-md text-on-surface-variant">
                        Đã có tài khoản?
                        <a id="goLoginLink" class="text-primary font-bold hover:underline ml-1" href="/login">Đăng nhập ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const signupMessage = document.getElementById("signupMessage");
        const signupForm = document.getElementById("signupForm");
        const signupBtn = document.getElementById("signupBtn");
        const goLoginLink = document.getElementById("goLoginLink");

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function getNextUrl() {
            const next = getQueryParam("next");
            if (!next || !next.startsWith("/") || next.startsWith("//") || next.startsWith("/static/")) {
                return "/home";
            }
            return next;
        }

        function setMessage(text, type) {
            signupMessage.textContent = text;
            signupMessage.className = "toast-message show mb-5 rounded-lg px-4 py-3 text-sm font-medium";
            if (type === "error") {
                signupMessage.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
            } else {
                signupMessage.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
            }
        }

        function isValidEmail(email) {
            if (!email || email.length > 254) {
                return false;
            }
            const parts = email.split("@");
            if (parts.length !== 2) {
                return false;
            }
            const local = parts[0];
            const domain = parts[1];
            if (!local || !domain) {
                return false;
            }
            if (local.startsWith(".") || local.endsWith(".") || local.includes("..")) {
                return false;
            }
            if (domain.startsWith(".") || domain.endsWith(".") || domain.includes("..")) {
                return false;
            }
            if (!domain.includes(".")) {
                return false;
            }
            if (!/^[A-Za-z0-9.!#$%&*+/=?^_`{|}~-]+$/.test(local)) {
                return false;
            }
            if (!/^[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)+$/.test(domain)) {
                return false;
            }
            const tld = domain.split(".").pop();
            return !!tld && /^[A-Za-z]{2,}$/.test(tld);
        }

        async function parseApiResponse(response) {
            const raw = await response.text();
            let data = {};
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch {
                data = {};
            }
            if (!response.ok) {
                throw new Error(data.error || data.detail || data.message || ("HTTP " + response.status));
            }
            return data;
        }

        async function handleSignupSubmit(event) {
            event.preventDefault();

            const fullName = document.getElementById("signupFullName").value.trim();
            const username = document.getElementById("signupUsername").value.trim();
            const email = document.getElementById("signupEmail").value.trim().toLowerCase();
            const password = document.getElementById("signupPassword").value;
            const confirmPassword = document.getElementById("signupConfirmPassword").value;
            const agreeTerms = document.getElementById("terms").checked;

            if (!fullName || !username || !email || !password || !confirmPassword) {
                setMessage("Vui lòng điền đầy đủ thông tin.", "error");
                return;
            }
            if (username.length < 3 || username.length > 20) {
                setMessage("Tên đăng nhập phải từ 3-20 ký tự.", "error");
                return;
            }
            if (!isValidEmail(email)) {
                setMessage("Email không hợp lệ. Vui lòng nhập đúng địa chỉ email (ví dụ: ten@domain.com).", "error");
                return;
            }
            if (password.length < 6) {
                setMessage("Mật khẩu phải có tối thiểu 6 ký tự.", "error");
                return;
            }
            if (password !== confirmPassword) {
                setMessage("Xác nhận mật khẩu không khớp.", "error");
                return;
            }
            if (!agreeTerms) {
                setMessage("Bạn cần đồng ý với điều khoản dịch vụ.", "error");
                return;
            }

            signupBtn.disabled = true;
            const originalLabel = signupBtn.textContent;
            signupBtn.textContent = "Đang tạo tài khoản...";
            try {
                const response = await fetch("/api/auth/signup", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        full_name: fullName,
                        username,
                        email,
                        password
                    })
                });
                await parseApiResponse(response);
                setMessage("Đăng ký thành công. Đang chuyển sang trang đăng nhập...", "success");
                const next = encodeURIComponent(getNextUrl());
                setTimeout(() => {
                    window.location.replace("/login?next=" + next);
                }, 700);
            } catch (error) {
                const msg = error && error.message === "Failed to fetch"
                    ? "Không thể kết nối máy chủ. Vui lòng kiểm tra server và thử lại."
                    : (error.message || "Đăng ký thất bại.");
                setMessage(msg, "error");
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = originalLabel;
            }
        }

        signupForm.addEventListener("submit", handleSignupSubmit);

        window.addEventListener("load", () => {
            const next = getQueryParam("next");
            if (next) {
                goLoginLink.href = "/login?next=" + encodeURIComponent(next);
            }
        });
    </script>
</body>
</html>
